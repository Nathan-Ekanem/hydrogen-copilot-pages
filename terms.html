<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hydrogen Investment Decision Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; margin:0; padding:20px;}
.card { background:white; color:black; padding:15px; border-radius:10px; margin-bottom:15px;}
h1 { color:#60a5fa; }

.kpi { font-size:20px; font-weight:bold; }

button { margin:5px; padding:8px; border:none; border-radius:6px; cursor:pointer;}
.active { background:black; color:white; }
</style>
</head>

<body>

<h1>Hydrogen Investment Decision Dashboard</h1>

<div class="card">
<h3>Investment Controls</h3>
Investment Multiplier: <span id="mult">1</span>x
<input type="range" min="1" max="5" step="0.5" value="1" id="slider">
</div>

<div class="card">
<h3>KPIs</h3>

<div class="kpi">Demand: <span id="demand"></span> TWh</div>
<div class="kpi">Capacity: <span id="capacity"></span> TWh</div>
<div class="kpi">Delivered: <span id="delivered"></span> TWh</div>
<div class="kpi">Coverage: <span id="coverage"></span></div>

</div>

<div class="card">
<h3>Strategy</h3>
<button onclick="setStrategy('balanced')" id="b1">Balanced</button>
<button onclick="setStrategy('bottleneck')" id="b2">Bottleneck</button>
<button onclick="setStrategy('missing')" id="b3">Missing Links</button>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<script>

// ---- DATA ----
let strategy = "balanced";

const demand = 70.32;
const baseCapacity = 20;

// ---- CHART ----
const ctx = document.getElementById('chart');
