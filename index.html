<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hydrogen Investment Decision Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:20px;}
.card { background:white; color:black; padding:15px; border-radius:10px; margin-bottom:15px;}
h1 { color:#60a5fa; }

button { padding:8px; margin:5px; border:none; border-radius:5px; cursor:pointer;}
.active { background:black; color:white; }

.kpi { font-size:18px; margin:5px 0;}
</style>
</head>

<body>

<h1>Hydrogen Investment Decision Dashboard</h1>

<div class="card">
<h3>Investment Control</h3>
Multiplier: <span id="mult"></span>x
<input type="range" min="1" max="5" step="0.5" value="1" id="slider">
</div>

<div class="card">
<h3>Strategy</h3>
<button onclick="setStrategy('balanced')" id="b1">Balanced</button>
<button onclick="setStrategy('bottleneck')" id="b2">Bottleneck Focus</button>
<button onclick="setStrategy('missing')" id="b3">Missing Links</button>
</div>

<div class="card">
<h3>KPIs</h3>
<div class="kpi">Demand: <span id="demand"></span> TWh</div>
<div class="kpi">Capacity: <span id="capacity"></span> TWh</div>
<div class="kpi">Delivered: <span id="delivered"></span> TWh</div>
<div class="kpi">Unmet: <span id="unmet"></span> TWh</div>
<div class="kpi">Coverage: <span id="coverage"></span></div>
</div>

<div class="card">
<h3>Investment Efficiency</h3>
<div class="kpi">£/TWh: <span id="eff"></span></div>
<div class="kpi">Readiness: <span id="ready"></span></div>
</div>

<div class="card">
<h3>System Chart</h3>
<canvas id="chart"></canvas>
</div>

<script>

let strategy = "balanced";

const demand = 70.32;
const baseCapacity = 20;
const baseCost = 2;

// Chart
const chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
        labels: ["Demand","Capacity","Delivered","Unmet"],
        datasets: [{
            label:"System",
            data:[0,0,0,0],
            backgroundColor:["blue","green","purple","red"]
        }]
    }
});

function update(){

    let mult = parseFloat(slider.value);

    let capacity = baseCapacity * mult;

    // strategy effects
    if(strategy === "bottleneck"){
        capacity *= 1.3;
    }
    if(strategy === "missing"){
        capacity *= 1.5;
    }

    let delivered = Math.min(capacity, demand);
    let unmet = demand - delivered;
    let coverage = (delivered/demand*100).toFixed(1)+"%";

    // efficiency
    let cost = baseCost * mult;
    let eff = (cost*1000 / delivered).toFixed(0)+" £m/TWh";

    let readiness = Math.min(100, (coverage.replace('%','')/80*100)).toFixed(0)+"%";

    document.getElementById("mult").innerText = mult;
    document.getElementById("demand").innerText = demand;
    document.getElementById("capacity").innerText = capacity.toFixed(1);
    document.getElementById("delivered").innerText = delivered.toFixed(1);
    document.getElementById("unmet").innerText = unmet.toFixed(1);
    document.getElementById("coverage").innerText = coverage;

    document.getElementById("eff").innerText = eff;
    document.getElementById("ready").innerText = readiness;

    chart.data.datasets[0].data = [demand, capacity, delivered, unmet];
    chart.update();
}

function setStrategy(s){

    strategy = s;

    document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));

    if(s==="balanced") b1.classList.add("active");
    if(s==="bottleneck") b2.classList.add("active");
    if(s==="missing") b3.classList.add("active");

    update();
}

slider.addEventListener("input", update);
setStrategy("balanced");

</script>

</body>
</html>
